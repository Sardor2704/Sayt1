<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Multi-Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; }
        .search-card:hover { transform: translateY(-2px); transition: 0.2s; }
    </style>
</head>
<body class="text-slate-200 min-h-screen">
    <div class="max-w-4xl mx-auto py-10 px-4">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                GLOBAL SEARCH
            </h1>
            <p class="text-slate-400 mt-3 font-medium">UZ • RU • EN | Universal qidiruv tizimi</p>
        </div>

        <form method="POST" action="/" class="relative mb-16">
            <input type="text" name="query" value="{{ query }}" 
                   placeholder="Istalgan tilda qidiring (masalan: Python darslari, Cinema 4D tutorial)..." 
                   class="w-full p-6 bg-slate-800/50 border border-slate-700 rounded-3xl outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 text-xl shadow-2xl backdrop-blur-sm">
            <button type="submit" class="absolute right-3 top-3 bottom-3 bg-blue-600 hover:bg-blue-500 px-8 rounded-2xl font-bold text-white transition-all active:scale-95">
                Topish
            </button>
        </form>

        <div class="space-y-8">
            {% for res in results %}
            <div class="search-card p-6 bg-slate-800/30 border border-slate-700/50 rounded-2xl hover:bg-slate-800/50">
                <div class="flex items-center gap-2 mb-2">
                    <img src="https://www.google.com/s2/favicons?domain={{ res.href }}&sz=32" alt="" class="w-4 h-4">
                    <span class="text-xs text-slate-500 truncate">{{ res.href }}</span>
                </div>
                <a href="{{ res.href }}" target="_blank" class="text-2xl font-semibold text-blue-400 hover:text-blue-300 transition-colors">
                    {{ res.title }}
                </a>
                <p class="text-slate-400 mt-3 leading-relaxed">{{ res.body }}</p>
            </div>
            {% endfor %}

            {% if query and not results %}
            <div class="text-center py-20 bg-slate-800/20 rounded-3xl border border-dashed border-slate-700">
                <p class="text-2xl text-slate-500 italic">Hech qanday natija topilmadi...</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
