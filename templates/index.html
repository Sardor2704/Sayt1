<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global File & Video Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen">

    <div class="container mx-auto px-4 py-10">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-600 mb-4">
                Global Search
            </h1>
            <p class="text-gray-400 text-lg">Hamma narsani (PDF, MP4, 18+, Excel) qidirib topish tizimi</p>
        </div>
        
<form action="/search" method="POST" class="mt-8">
    <input type="text" name="query" placeholder="Sevgi istirobi" 
           class="w-full p-4 rounded-lg bg-gray-800 text-white border border-gray-700">
    <button type="submit" class="mt-4 w-full bg-blue-600 p-3 rounded-lg font-bold">
        Qidirish
    </button>
</form>
