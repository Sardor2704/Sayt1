<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-5">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-4xl font-bold text-center text-blue-400 mb-2">Global Search</h1>
        <p class="text-center text-gray-400 mb-8">Hamma narsani (PDF, MP4, Excel) qidirish tizimi</p>

        <form action="/search" method="POST" class="space-y-4">
            <input type="text" name="query" value="{{ query }}" placeholder="Nima qidiramiz?..." 
                   class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none">
            
            <select name="type" class="w-full p-3 rounded-xl bg-slate-800 border border-slate-700">
                <option value="all">Hammasi</option>
                <option value="pdf">Faqat PDF</option>
                <option value="video">Faqat Video (MP4/MKV)</option>
                <option value="word">Faqat Word</option>
            </select>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-xl font-bold transition">
                Qidirish
            </button>
        </form>

        <hr class="my-10 border-slate-800">

        <div class="results space-y-6">
            {% if results %}
                <h2 class="text-xl font-semibold mb-4 text-green-400">Topilgan natijalar:</h2>
                {% for res in results %}
                <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700 hover:border-blue-500 transition">
                    <a href="{{ res.link }}" target="_blank" class="text-xl font-bold text-blue-300 hover:underline">
                        {{ res.title }}
                    </a>
                    <p class="text-gray-400 mt-2 text-sm">{{ res.snippet }}</p>
                    <p class="text-blue-500 text-xs mt-3 truncate">{{ res.link }}</p>
                </div>
                {% endfor %}
            {% elif query %}
                <p class="text-center text-red-400">Afsuski, hech nima topilmadi.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
