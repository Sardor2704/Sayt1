<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Search | UZ-RU-EN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f19] text-slate-300 font-sans min-h-screen">
    <div class="max-w-3xl mx-auto py-12 px-6">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-black bg-gradient-to-r from-blue-500 via-teal-400 to-indigo-500 bg-clip-text text-transparent">
                GLOBAL
            </h1>
            <p class="text-slate-500 mt-4 tracking-widest uppercase text-xs font-bold">Universal Search Engine</p>
        </div>

        <form method="POST" action="/" class="relative shadow-2xl rounded-3xl overflow-hidden border border-slate-700/50">
            <input type="text" name="query" value="{{ query }}" 
                   placeholder="Istalgan tilda qidiring..." 
                   class="w-full p-6 bg-slate-800/80 outline-none text-white text-lg placeholder-slate-500">
            <button type="submit" class="absolute right-3 top-3 bottom-3 bg-blue-600 hover:bg-blue-500 px-8 rounded-2xl font-bold text-white transition-all transform active:scale-95">
                Topish
            </button>
        </form>

        <div class="mt-16 space-y-10">
            {% for res in results %}
            <div class="group border-l-2 border-transparent hover:border-blue-500 pl-6 transition-all">
                <p class="text-xs text-slate-500 mb-2 truncate opacity-60">{{ res.href }}</p>
                <a href="{{ res.href }}" target="_blank" class="text-2xl font-bold text-blue-400 group-hover:text-blue-300 transition-colors">
                    {{ res.title }}
                </a>
                <p class="text-slate-400 mt-3 leading-relaxed text-base">{{ res.body }}</p>
            </div>
            {% endfor %}

            {% if query and not results %}
            <div class="text-center py-20 opacity-50">
                <p class="text-xl">Hech qanday natija topilmadi...</p>
                <p class="text-sm mt-2">Boshqa kalit so'zlar bilan urinib ko'ring.</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
